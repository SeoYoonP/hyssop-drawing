<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>민래님의 성경 배움터</title>
<style>
/* =====================================================================
   메인 메뉴 (index.html)
   — 각 과 프로그램(lesson1.html ~ lesson6.html)으로 들어가는 첫 화면
   — 1~4과와 동일한 디자인 시스템(종이 배경, 카드, 큰 버튼)
   대상: 이민래 학생 / 기기: 아이패드·갤럭시탭·컴퓨터 공용
   ===================================================================== */
:root{
  --paper:#fbf7ef; --card:#fff; --ink:#2b2a26; --soft:#7a7770;
  --line:#e7e0d3; --ok:#5aa96a; --sun:#f0a92e; --love:#e8668a;
  --sky:#4a95d8; --grape:#8e6fc0; --earth:#8a6a4a; --blood:#a41f1f;
  --shadow:0 6px 0 rgba(0,0,0,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;min-height:100%;}
body{
  font-family:"Apple SD Gothic Neo","Malgun Gothic","Pretendard",sans-serif;
  background:var(--paper);color:var(--ink);
  -webkit-touch-callout:none;
}
a{color:inherit;text-decoration:none;}

.wrap{max-width:820px;margin:0 auto;padding:26px 18px 40px;}

/* ---------- 머리글 ---------- */
.hero{text-align:center;margin-bottom:26px;}
.hero .em{font-size:56px;line-height:1;}
.hero h1{
  font-size:clamp(26px,6vw,36px);font-weight:800;letter-spacing:-0.5px;
  margin:10px 0 6px;line-height:1.35;
}
.hero h1 .hl{color:var(--sun);}
.hero p{color:var(--soft);font-size:17px;font-weight:700;margin:0;}

/* ---------- 과 카드 ---------- */
.grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:16px;
}
@media(max-width:540px){.grid{grid-template-columns:1fr;}}
.card{
  position:relative;display:flex;align-items:center;gap:16px;
  background:var(--card);border:3px solid var(--line);border-radius:22px;
  padding:18px 18px 18px 16px;box-shadow:var(--shadow);
  transition:transform .12s ease;
}
.card:active{transform:translateY(2px);}
.card .big-em{
  flex:0 0 auto;width:74px;height:74px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:42px;background:var(--tint,#f6f2e8);
}
.card .tx{min-width:0;}
.card .no{
  display:inline-block;font-size:13px;font-weight:800;color:#fff;
  background:var(--ac,var(--sun));border-radius:999px;padding:3px 10px;margin-bottom:6px;
}
.card .ti{font-size:19px;font-weight:800;letter-spacing:-0.5px;line-height:1.3;}
.card .sb{font-size:14px;font-weight:700;color:var(--soft);margin-top:3px;}
.card .go{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-size:22px;color:var(--line);
}
.card:hover{border-color:var(--ac,var(--sun));}
.card:hover .go{color:var(--ac,var(--sun));}

/* 과별 색 */
.l1{--ac:var(--sun);  --tint:#fdf3df;}
.l2{--ac:var(--love); --tint:#fdeef3;}
.l3{--ac:var(--earth);--tint:#f3ece4;}
.l4{--ac:var(--sky);  --tint:#e9f3fc;}
.l5{--ac:#4b4a45;     --tint:#efede8;}
.l6{--ac:var(--blood);--tint:#fbeaea;}

/* ---------- 바닥글 ---------- */
.foot{
  text-align:center;color:var(--soft);font-size:14px;font-weight:700;
  margin-top:30px;line-height:1.7;
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="em">📖</div>
    <h1><span class="hl">민래님</span>의 성경 배움터</h1>
    <p>오늘 배울 과를 눌러 보세요</p>
  </div>

  <div class="grid">
    <a class="card l1" href="lesson1.html">
      <div class="big-em">☀️</div>
      <div class="tx">
        <span class="no">1과</span>
        <div class="ti">하나님이 모두 만드셨어요</div>
        <div class="sb">점선을 따라 그려요</div>
      </div>
      <div class="go">▶</div>
    </a>

    <a class="card l2" href="lesson2.html">
      <div class="big-em">❤️</div>
      <div class="tx">
        <span class="no">2과</span>
        <div class="ti">하나님은 사람을 사랑하세요</div>
        <div class="sb">하트를 끌어서 붙여요</div>
      </div>
      <div class="go">▶</div>
    </a>

    <a class="card l3" href="lesson3.html">
      <div class="big-em">📖</div>
      <div class="tx">
        <span class="no">3과</span>
        <div class="ti">하나님 말씀, 성경책</div>
        <div class="sb">성경책을 찾고 책장을 넘겨요</div>
      </div>
      <div class="go">▶</div>
    </a>

    <a class="card l4" href="lesson4.html">
      <div class="big-em">☁️</div>
      <div class="tx">
        <span class="no">4과</span>
        <div class="ti">하나님이 하늘나라를 준비했어요</div>
        <div class="sb">하늘나라를 꾸미고 따라 써요</div>
      </div>
      <div class="go">▶</div>
    </a>

    <a class="card l5" href="lesson5.html">
      <div class="big-em">💭</div>
      <div class="tx">
        <span class="no">5과</span>
        <div class="ti">죄</div>
        <div class="sb">내 안의 죄를 알아봐요</div>
      </div>
      <div class="go">▶</div>
    </a>

    <a class="card l6" href="lesson6.html">
      <div class="big-em">✝️</div>
      <div class="tx">
        <span class="no">6과</span>
        <div class="ti">예수님이 죄를 없애주셨어요</div>
        <div class="sb">예수님의 피가 죄를 씻어요</div>
      </div>
      <div class="go">▶</div>
    </a>
  </div>

  <div class="foot">
    발달장애 학생을 위한 성경 학습 프로그램<br>
    아이패드 · 갤럭시탭 · 컴퓨터에서 모두 사용할 수 있어요
  </div>

</div>
</body>
</html>
