<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>3과 · 하나님 말씀, 성경책 — 성경책 찾기</title>
<style>
/* =====================================================================
   3과: 하나님 말씀, 성경책 — 성경책 찾기 & 말씀 넘겨 보기
   대상: 이민래 학생 (구체물·시각 정보 기반 선택 활동 가능)
   기기: 아이패드(애플펜슬/손가락) + 컴퓨터(마우스) 겸용 — Pointer Events
   흐름: [고르기 2권] → [고르기 3권] → [성경책 넘기기 → 사랑 말씀]
   책장: 세로 조각 사슬(휘어지는 종이) + 잡은 지점 추적 + 중력/관성
         + 왼쪽 페이지를 잡으면 앞 장으로 되돌리기 가능
   ===================================================================== */
:root{
  --paper:#fbf7ef; --card:#fff; --ink:#2b2a26; --soft:#7a7770;
  --line:#e7e0d3; --ok:#5aa96a; --sun:#f0a92e; --love:#e8668a;
  --shadow:0 6px 0 rgba(0,0,0,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;margin:0;}
@supports(height:100dvh){html,body{height:100dvh;}}
body{
  font-family:"Apple SD Gothic Neo","Malgun Gothic","Pretendard",sans-serif;
  background:var(--paper);color:var(--ink);
  overflow:hidden;overscroll-behavior:none;
  -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
}
button{font-family:inherit;border:none;background:none;color:inherit;cursor:pointer;touch-action:manipulation;}

#app{height:100%;display:flex;flex-direction:column;}
header{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  background:var(--card);border-bottom:1px solid var(--line);
}
header .t{font-size:18px;font-weight:800;}
header .t small{color:var(--soft);font-weight:600;margin-left:6px;font-size:14px;}
#stars{margin-left:auto;font-size:20px;min-height:24px;letter-spacing:2px;}

.screen{flex:1;display:none;flex-direction:column;align-items:center;padding:14px;overflow:hidden;}
.screen.on{display:flex;animation:fade .3s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ---------- 시작 화면 ---------- */
#start{justify-content:center;text-align:center;}
#start .big{font-size:30px;font-weight:800;line-height:1.4;letter-spacing:-0.5px;}
#start .big .hl{color:var(--sun);}
#start p{color:var(--soft);font-size:18px;margin:10px 0 26px;}
.go-btn{
  font-size:26px;font-weight:800;padding:20px 54px;border-radius:24px;
  background:var(--ink);color:#fff;box-shadow:var(--shadow);
}
.go-btn:active{transform:translateY(2px);}

/* ---------- 책 고르기 화면 ---------- */
#pick{justify-content:center;}
.say-line{font-size:24px;font-weight:800;text-align:center;margin:2px 0 6px;letter-spacing:-0.5px;}
.say-line .nm{color:var(--sun);}
#pick-sub{color:var(--soft);font-size:17px;font-weight:700;margin:0 0 18px;min-height:24px;text-align:center;}
#pick-sub.oops{color:var(--love);animation:fade .25s ease;}
#book-row{
  display:flex;gap:22px;flex-wrap:wrap;justify-content:center;align-items:flex-end;
  width:100%;max-width:760px;
}
.book-btn{
  background:var(--card);border:3px solid var(--line);border-radius:22px;
  padding:16px 14px 12px;box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  transition:transform .12s ease;
}
.book-btn:active{transform:scale(.94);}
.book-btn svg{width:min(160px,34vw);height:auto;display:block;}
.book-btn .lb{font-size:18px;font-weight:800;color:var(--soft);}
.book-btn.shake{animation:shake .45s ease;}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-9px);}40%{transform:translateX(9px);}
  60%{transform:translateX(-6px);}80%{transform:translateX(6px);}
}
.stage-dots{display:flex;gap:7px;justify-content:center;margin-bottom:14px;}
.stage-dots .dot{width:10px;height:10px;border-radius:50%;background:var(--line);}
.stage-dots .dot.on{background:var(--ink);}

/* ---------- 성경책 넘기기 화면 ---------- */
#read{padding:10px 14px 14px;}
#read .say-line{margin-bottom:10px;}
#book-stage{
  position:relative;flex:1;width:100%;max-width:820px;min-height:240px;
  display:flex;align-items:center;justify-content:center;
}
#book{
  position:relative;width:100%;height:100%;max-height:520px;
  perspective:2400px;touch-action:none; /* 책장 드래그 중 스크롤/줌 완전 차단 */
  display:flex;border-radius:18px;
  background:linear-gradient(90deg,#8a6a4a 0%,#6f5238 50%,#8a6a4a 100%);
  padding:12px;box-shadow:var(--shadow);
}
.pg{
  width:50%;height:100%;background:#fffdf4;position:relative;overflow:hidden;
}
.pg.left{border-radius:10px 2px 2px 10px;box-shadow:inset -14px 0 22px -14px rgba(0,0,0,.22);}
.pg.right{border-radius:2px 10px 10px 2px;box-shadow:inset 14px 0 22px -14px rgba(0,0,0,.22);}
.slot{position:absolute;inset:0;}

/* 휘어지는 책장: 세로 조각 사슬 */
#leaf{
  position:absolute;top:12px;bottom:12px;left:50%;width:calc(50% - 12px);
  transform-origin:left center;transform-style:preserve-3d;
  will-change:transform;z-index:3;pointer-events:none;
}
.seg{
  position:absolute;top:0;bottom:0;
  transform-origin:left center;transform-style:preserve-3d;will-change:transform;
}
.sface{
  position:absolute;inset:0;background:#fffdf4;overflow:hidden;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
}
.sface.b{transform:rotateY(180deg);}
.cl{position:absolute;top:0;bottom:0;left:0;}
.sshade{position:absolute;inset:0;pointer-events:none;}

/* 아래 페이지·왼쪽 페이지에 드리우는 그림자 */
#sh-under{position:absolute;top:0;bottom:0;left:0;width:55%;pointer-events:none;opacity:0;
  background:linear-gradient(to right,rgba(0,0,0,.38),rgba(0,0,0,0));}
#sh-left{position:absolute;top:0;bottom:0;right:0;width:55%;pointer-events:none;opacity:0;
  background:linear-gradient(to left,rgba(0,0,0,.30),rgba(0,0,0,0));}

/* 페이지 내용 공통 */
.pcontent{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:6% 9%;gap:10px;
}
.pcontent .em{font-size:clamp(44px,9vw,74px);line-height:1;}
.pcontent .vs{font-size:clamp(20px,4.2vw,32px);font-weight:800;line-height:1.5;letter-spacing:-0.5px;word-break:keep-all;}
.pcontent .vs .nm{color:var(--love);}
.pcontent .rf{font-size:clamp(14px,2.6vw,19px);font-weight:700;color:var(--soft);}
.pcontent .hint-arrow{font-size:clamp(34px,7vw,56px);animation:slideL 1.2s ease infinite;}
@keyframes slideL{0%,100%{transform:translateX(10px);}50%{transform:translateX(-14px);}}
.pcontent .cover-t{font-size:clamp(26px,5vw,42px);font-weight:800;letter-spacing:6px;}
.pcontent.decor .em{opacity:.9;}
#corner-hint{
  position:absolute;right:6%;bottom:6%;font-size:15px;font-weight:800;color:var(--soft);
  background:#fff;border:2px solid var(--line);border-radius:12px;padding:6px 10px;
  pointer-events:none;z-index:4;animation:fade .3s ease;
}
#btn-finish{
  display:none;margin-top:12px;font-size:20px;padding:14px 36px;border-radius:20px;
  animation:fade .3s ease;
}
#btn-finish.on{display:block;}

/* 칭찬 오버레이 (전체 공용) */
#praise{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(255,255,255,.93);flex-direction:column;text-align:center;z-index:50;
}
#praise.on{display:flex;animation:fade .25s ease;}
#praise .big-e{font-size:80px;animation:pop .45s ease;}
@keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.2);}100%{transform:scale(1);}}
#praise .msg{font-size:27px;font-weight:800;margin-top:8px;letter-spacing:-0.5px;}
#praise .sub{font-size:19px;color:var(--soft);margin-top:5px;font-weight:700;}

/* ---------- 마무리 화면 ---------- */
#end{justify-content:center;text-align:center;}
#end .em{font-size:76px;}
#end h2{font-size:28px;font-weight:800;margin:12px 0 4px;letter-spacing:-0.5px;}
#end h2 .nm{color:var(--love);}
#end p{color:var(--soft);font-size:18px;font-weight:700;margin:0 0 26px;}
.heart-row{font-size:30px;letter-spacing:6px;margin-bottom:10px;}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="t">3과 · 성경책 찾기<small>하나님 말씀, 성경책</small></div>
    <div id="stars"></div>
  </header>

  <!-- 시작 -->
  <section class="screen on" id="start">
    <div class="big">하나님 사랑은 <span class="hl">성경책</span>에 있어요</div>
    <p>성경책을 찾고, 책장을 넘겨 보세요 📖</p>
    <button class="go-btn" id="btn-start">시작하기</button>
  </section>

  <!-- 1) 책 고르기 -->
  <section class="screen" id="pick">
    <div class="stage-dots" id="stage-dots"></div>
    <div class="say-line">“<span class="nm">성경책</span> 은 어느 것일까요?”</div>
    <div id="pick-sub">성경책을 눌러 보세요</div>
    <div id="book-row"></div>
  </section>

  <!-- 2) 성경책 넘기기 -->
  <section class="screen" id="read">
    <div class="say-line" id="read-line">📖 책장을 잡고 <span class="nm">왼쪽</span>으로 넘겨요</div>
    <div id="book-stage">
      <div id="book">
        <div class="pg left"><div class="slot" id="pg-left"></div><div id="sh-left"></div></div>
        <div class="pg right"><div class="slot" id="pg-under"></div><div id="sh-under"></div></div>
        <div id="leaf"></div>
        <div id="corner-hint">👆 여기를 잡고 넘겨요</div>
      </div>
    </div>
    <button class="go-btn" id="btn-finish">💛 다 읽었어요</button>
  </section>

  <!-- 마무리 -->
  <section class="screen" id="end">
    <div class="em">🥰</div>
    <!-- <div class="heart-row">💛 💗 💛</div> -->
    <h2>성경책에 <span class="nm">하나님 사랑</span>이 있어요</h2>
    <p>민래님, 성경책에서 하나님의 사랑을 발견하셨나요?!</p>
    <button class="go-btn" id="btn-again">한 번 더 하기</button>
  </section>

  <!-- 칭찬 -->
  <div id="praise">
    <div class="big-e" id="pr-emoji">⭐</div>
    <div class="msg" id="pr-msg"></div>
    <div class="sub" id="pr-sub"></div>
  </div>
</div>

<script>
(function(){
"use strict";
var STUDENT="민래";

/* ================= 책 3권 SVG ================= */
var BOOKS={
  bible:{key:"bible", svg:
  '<svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">'+
  '<rect x="10" y="8" width="140" height="184" rx="12" fill="#4a4238"/>'+
  '<rect x="22" y="8" width="128" height="184" rx="10" fill="#5b5143"/>'+
  '<rect x="118" y="0" width="14" height="60" fill="#c23b4a"/>'+
  '<path d="M118 60 l7 -9 l7 9 z" fill="#c23b4a"/>'+
  '<rect x="52" y="78" width="66" height="4" rx="2" fill="#e9c15c"/>'+
  '<text x="80" y="118" text-anchor="middle" font-size="30" font-weight="800" fill="#e9c15c" font-family="inherit">성 경</text>'+
  '<rect x="52" y="132" width="66" height="4" rx="2" fill="#e9c15c"/>'+
  '<rect x="34" y="20" width="104" height="160" rx="8" fill="none" stroke="#e9c15c" stroke-width="1.5" opacity="0.5"/>'+
  '<rect x="22" y="8" width="128" height="184" rx="10" fill="none" stroke="#3c352c" stroke-width="3"/>'+
  '</svg>'},
  note:{key:"note", svg:
   '<svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">'+
   '<rect x="18" y="10" width="130" height="180" rx="10" fill="#bfe0f2"/>'+
   '<rect x="18" y="10" width="130" height="180" rx="10" fill="none" stroke="#8fbdd8" stroke-width="3"/>'+
   '<g fill="#f4fbff" stroke="#8fbdd8" stroke-width="2.5">'+
   '<circle cx="18" cy="30" r="7"/><circle cx="18" cy="62" r="7"/><circle cx="18" cy="94" r="7"/>'+
   '<circle cx="18" cy="126" r="7"/><circle cx="18" cy="158" r="7"/></g>'+
   '<rect x="44" y="46" width="86" height="52" rx="8" fill="#ffffff" stroke="#8fbdd8" stroke-width="2.5"/>'+
   '<text x="87" y="80" text-anchor="middle" font-size="24" font-weight="800" fill="#4d7f9e" font-family="inherit">공책</text>'+
   '<g stroke="#a9cee2" stroke-width="3" stroke-linecap="round">'+
   '<line x1="46" y1="122" x2="130" y2="122"/><line x1="46" y1="142" x2="130" y2="142"/>'+
   '<line x1="46" y1="162" x2="112" y2="162"/></g>'+
   '</svg>'},
  pic:{key:"pic", svg:
   '<svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg">'+
   '<rect x="12" y="10" width="136" height="180" rx="12" fill="#ffd66b"/>'+
   '<rect x="12" y="10" width="136" height="180" rx="12" fill="none" stroke="#e8b53e" stroke-width="3"/>'+
   '<rect x="28" y="52" width="104" height="76" rx="10" fill="#e8f6ff" stroke="#e8b53e" stroke-width="2.5"/>'+
   '<circle cx="52" cy="74" r="11" fill="#f0a92e"/>'+
   '<path d="M30 122 l24 -26 l18 18 l14 -14 l26 22 z" fill="#7fc487"/>'+
   '<text x="80" y="165" text-anchor="middle" font-size="24" font-weight="800" fill="#8a6414" font-family="inherit">그림책</text>'+
   '</svg>'}
};
BOOKS.bible.name="성경책"; BOOKS.note.name="공책"; BOOKS.pic.name="그림책";
BOOKS.note.hint="이건 공책이에요."; BOOKS.pic.hint="이건 그림책이에요.";

/* 고르기 단계: 처음 2권 → 안정되면 3권 (활동지 '확인·주의' 반영) */
var ROUNDS=[ ["bible","note"], ["bible","note","pic"] ];
var round=0, starCount=0;

/* ================= 성경 페이지(펼침) 내용 ================= */
var PAGES=[
 {type:"hint"},
 {vs:"하나님은\n사랑이심이라", ref:"요한일서 4장 8절", em:"💛"},
 {vs:"오직 하나님이\n우리를 사랑하사", ref:"요한일서 4장 10절", em:"💗"},
 {type:"final", vs:"", em:"🥰"}
];
var pk=0; // 현재 오른쪽 페이지 index

/* ================= 요소 ================= */
var $=function(id){return document.getElementById(id);};
var scr={start:$("start"),pick:$("pick"),read:$("read"),end:$("end")};
var praiseEl=$("praise"), starsEl=$("stars");
var pickSub=$("pick-sub"), bookRow=$("book-row"), stageDots=$("stage-dots");
var pgLeft=$("pg-left"), pgUnder=$("pg-under");
var leaf=$("leaf"), bookEl=$("book");
var shU=$("sh-under"), shL=$("sh-left");
var cornerHint=$("corner-hint"), readLine=$("read-line"), finishBtn=$("btn-finish");

function show(name){
  Object.keys(scr).forEach(function(k){scr[k].classList.remove("on");});
  scr[name].classList.add("on");
}
function renderStars(){ starsEl.textContent="⭐".repeat(Math.min(starCount,8)); }
function praise(emoji,msg,sub,ms,cb){
  $("pr-emoji").textContent=emoji; $("pr-msg").textContent=msg; $("pr-sub").textContent=sub||"";
  praiseEl.classList.add("on");
  setTimeout(function(){ praiseEl.classList.remove("on"); if(cb)cb(); }, ms||1900);
}

/* ================= 1) 책 고르기 ================= */
function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }
function buildDots(){
  stageDots.innerHTML="";
  ROUNDS.forEach(function(_,i){
    var d=document.createElement("div");
    d.className="dot"+(i<=round?" on":"");
    stageDots.appendChild(d);
  });
}
function loadRound(){
  buildDots();
  pickSub.classList.remove("oops");
  pickSub.textContent = (round===0)?"성경책을 눌러 보세요":"이번엔 세 권이에요! 성경책은 어디 있을까요?";
  bookRow.innerHTML="";
  shuffle(ROUNDS[round]).forEach(function(key){
    var bk=BOOKS[key];
    var b=document.createElement("button");
    b.className="book-btn";
    b.innerHTML=bk.svg+'<span class="lb">'+bk.name+'</span>';
    b.addEventListener("click",function(){ onPick(key,b); });
    bookRow.appendChild(b);
  });
}
var pickLock=false;
function onPick(key,btn){
  if(pickLock) return;
  if(key==="bible"){
    pickLock=true;
    starCount++; renderStars();
    praise("📖","찾았어요! 성경책이에요","성경책은 하나님이 주신 책이에요",2000,function(){
      pickLock=false;
      round++;
      if(round<ROUNDS.length){ loadRound(); }
      else { openBook(); }
    });
  }else{
    btn.classList.add("shake");
    pickSub.classList.add("oops");
    pickSub.textContent=BOOKS[key].hint+" 성경책을 다시 찾아보세요!";
    setTimeout(function(){ btn.classList.remove("shake"); },500);
  }
}

/* ================= 2) 성경책 넘기기 — 휘어지는 종이 물리 엔진 =================
   · 책장을 세로 조각 N개의 사슬로 만들어, 넘길 때 종이가 실제로 '휘어짐'
   · 잡은 지점을 정확히 따라옴: angle = acos(손가락x / 잡은반지름)
   · 놓으면 중력 낙하 — 반(90°) 기준으로 넘어가거나 되돌아오고, 플릭 관성 지원
   · 넘어가는 중에도 다시 잡을 수 있고,
     왼쪽 페이지를 잡아 오른쪽으로 끌면 '앞 장으로 되돌리기' */
function pageHTML(p){
  if(!p) return "";
  if(p.type==="hint"){
    return '<div class="pcontent"><div class="hint-arrow">👈</div>'+
           '<div class="vs">책장을 잡고<br>왼쪽으로 넘겨요</div></div>';
  }
  if(p.type==="final"){
    return '<div class="pcontent"><div class="em">'+p.em+'</div>'+
           '<div class="vs">하나님은 <span class="nm">'+STUDENT+'</span>를<br>사랑하세요</div></div>';
  }
  return '<div class="pcontent"><div class="em">'+p.em+'</div>'+
         '<div class="vs">'+p.vs.replace(/\n/g,"<br>")+'</div>'+
         (p.ref?'<div class="rf">'+p.ref+'</div>':'')+'</div>';
}
function decorHTML(){
  return '<div class="pcontent decor"><div class="em">💛</div></div>';
}
function coverLeftHTML(){
  return '<div class="pcontent"><div class="cover-t">성 경</div>'+
         '<div class="rf">하나님 말씀 책</div><div class="em">💛</div></div>';
}

var N=8, segs=[], clF=[], clB=[], shSegF=[], shSegB=[];
var ang=0, vel=0, db=0;      // 시트 평균 각도(0~180), 각속도, 조각 간 굽힘각
var lastDirSign=1;           // 마지막 이동 방향(정적 처짐 방향)
var mode="idle";             // idle | drag | settle
var dirMode="fwd";           // fwd: 다음 장으로 | back: 앞 장으로 되돌리기
var dragId=null, grabR=1, committing=false;
var rafId=null, lastT=0, lastMoveT=0, lastMoveAng=0;
var GRAV=900, MAXV=1500;

function pageW(){ return bookEl.getBoundingClientRect().width/2 - 12; }
function spineX(){ var r=bookEl.getBoundingClientRect(); return r.left + r.width/2; }

function buildSegs(){
  leaf.innerHTML=""; segs=[]; clF=[]; clB=[]; shSegF=[]; shSegB=[];
  var parent=leaf;
  for(var i=0;i<N;i++){
    var s=document.createElement("div"); s.className="seg";
    var f=document.createElement("div"); f.className="sface f";
    var b=document.createElement("div"); b.className="sface b";
    var cf=document.createElement("div"); cf.className="cl";
    var cb=document.createElement("div"); cb.className="cl";
    var gf=document.createElement("div"); gf.className="sshade";
    var gb=document.createElement("div"); gb.className="sshade";
    f.appendChild(cf); f.appendChild(gf);
    b.appendChild(cb); b.appendChild(gb);
    s.appendChild(f); s.appendChild(b);
    parent.appendChild(s); parent=s;
    segs.push(s); clF.push(cf); clB.push(cb); shSegF.push(gf); shSegB.push(gb);
  }
  layoutSegs();
}
function layoutSegs(){
  var pw=pageW(), sw=pw/N;
  for(var i=0;i<N;i++){
    segs[i].style.width=(sw+0.8)+"px";
    segs[i].style.left=(i===0?0:sw)+"px";
    clF[i].style.width=pw+"px";
    clF[i].style.transform="translateX("+(-i*sw)+"px)";
    clB[i].style.width=pw+"px";
    clB[i].style.transform="translateX("+((i+1)*sw-pw)+"px)";
  }
}
function setLeafContent(frontHTML,backHTML){
  for(var i=0;i<N;i++){ clF[i].innerHTML=frontHTML; clB[i].innerHTML=backHTML; }
}

function paint(dt){
  // 굽힘: 손이 이끄는 가장자리가 앞서 나가고 안쪽이 따라오며 종이가 크게 휨
  if(Math.abs(vel)>60) lastDirSign=(vel>=0)?1:-1;
  var flat=Math.min(1, Math.sin(ang*Math.PI/180)*2.2);   // 평평할 땐 굽힘 0
  var bendT=(Math.max(-8,Math.min(8, vel*0.020))          // 움직임에 의한 휨
            + lastDirSign*3.2)*flat;                      // 들려 있는 동안 늘 처지는 곡률
  db+=(bendT-db)*Math.min(1,(dt||0.016)*10);
  var a0=ang-db*(N-1)/2;
  leaf.style.transform="rotateY("+(-a0)+"deg)";
  for(var i=0;i<N;i++){
    if(i>0) segs[i].style.transform="rotateY("+(-db)+"deg)";
    // 조각별 곡면 조명: 세워질수록 어둡고, 조각마다 밝기가 달라 곡률이 보임
    var ai=(a0+db*i+db/2)*Math.PI/180;
    var s=Math.abs(Math.sin(ai));
    shSegF[i].style.background="rgba(60,40,20,"+(s*0.32).toFixed(3)+")";
    shSegB[i].style.background="rgba(60,40,20,"+(s*0.28).toFixed(3)+")";
  }
  var sAll=Math.sin(ang*Math.PI/180);
  shU.style.opacity=(sAll*0.85).toFixed(3);                   // 들린 책장이 아래 페이지에 드리우는 그림자
  shL.style.opacity=Math.max(0,(ang-100)/80*0.75).toFixed(3); // 왼쪽에 내려앉기 직전 그림자
}

/* 메인 루프: 드래그 추적 + 중력 낙하 + 굽힘 스무딩을 한 곳에서 */
function loop(t){
  var dt=Math.min(0.032,(t-lastT)/1000)||0.016; lastT=t;
  if(mode==="settle"){
    var dir=(ang>90)?1:(ang<90?-1:(vel>=0?1:-1)); // 기울어진 쪽으로 낙하
    vel+=GRAV*dir*dt;
    vel=Math.max(-MAXV,Math.min(MAXV,vel));
    ang+=vel*dt;
    if(ang<=0){
      ang=0; vel=0; mode="idle";
      if(dirMode==="back"){ paint(dt); commitBack(); rafId=requestAnimationFrame(loop); return; }
    }else if(ang>=180){
      ang=180; vel=0; mode="idle";
      paint(dt);
      if(dirMode==="fwd"){ commitTurn(); } else { restoreFromBack(); }
      rafId=requestAnimationFrame(loop); return;
    }
  }else if(mode==="idle"){ vel*=0.8; }
  paint(dt);
  rafId=requestAnimationFrame(loop);
}
function startLoop(){ if(!rafId){ lastT=performance.now(); rafId=requestAnimationFrame(loop); } }
function stopLoop(){ if(rafId){ cancelAnimationFrame(rafId); rafId=null; } }

bookEl.addEventListener("pointerdown",function(e){
  if(committing||mode==="drag") return;
  if(scr.read.classList.contains("on")===false) return;
  var pw=pageW(), fx=e.clientX-spineX();
  if(ang<=0.5){ // 평평한 상태에서 새로 잡기
    if(fx>pw*0.12 && pk<PAGES.length-1){ dirMode="fwd"; }
    else if(fx<-pw*0.12 && pk>0){ dirMode="back"; setupBack(); } // 마지막 장에서도 되돌리기 가능
    else return;
  } // (넘어가는 중이면 방향 그대로 다시 잡음)
  e.preventDefault();
  mode="drag"; dragId=e.pointerId;
  bookEl.setPointerCapture(e.pointerId);
  // 잡은 반지름: 현재 각도에서 손가락 아래에 있는 종이 지점까지의 거리
  var cos=Math.cos(ang*Math.PI/180);
  grabR=(Math.abs(cos)>0.25)? Math.abs(fx/cos) : pw;
  grabR=Math.max(pw*0.35,Math.min(pw,grabR));
  vel=0; lastMoveT=performance.now(); lastMoveAng=ang;
  cornerHint.style.display="none";
});
bookEl.addEventListener("pointermove",function(e){
  if(mode!=="drag"||e.pointerId!==dragId) return;
  e.preventDefault();
  var fx=Math.max(-grabR,Math.min(grabR,e.clientX-spineX()));
  ang=Math.acos(fx/grabR)*180/Math.PI;   // 잡은 지점이 손가락을 정확히 따라옴
  var now=performance.now(), dtm=(now-lastMoveT)/1000;
  if(dtm>0.016){ vel=(ang-lastMoveAng)/dtm; lastMoveT=now; lastMoveAng=ang; } // 플릭 속도
});
function endDrag(e){
  if(mode!=="drag"||e.pointerId!==dragId) return;
  dragId=null;
  mode="settle"; // 관성 + 중력으로 자연스럽게 마무리
}
bookEl.addEventListener("pointerup",endDrag);
bookEl.addEventListener("pointercancel",endDrag);

/* ---- 앞으로 넘김 / 되돌리기 상태 전환 ---- */
function renderSpread(){
  leaf.style.display="block";
  ang=0; vel=0; db=0;
  setLeafContent(pageHTML(PAGES[pk]), decorHTML());
  pgUnder.innerHTML=pageHTML(PAGES[pk+1]);
  paint(0.016);
}
function setupBack(){ // 왼쪽에 놓인 지난 장을 다시 집어 올림
  leaf.style.display="block";
  finishBtn.classList.remove("on");
  setLeafContent(pageHTML(PAGES[pk-1]), decorHTML());
  pgUnder.innerHTML=pageHTML(PAGES[pk]);
  pgLeft.innerHTML=(pk-1>0)? decorHTML() : coverLeftHTML();
  ang=180; vel=0; db=0;
}
function commitBack(){ // 끝까지 되돌림 → 앞 장으로
  committing=true;
  pk--; starCount=Math.max(0,starCount-1); renderStars();
  pgLeft.innerHTML=(pk>0)? decorHTML() : coverLeftHTML();
  renderSpread();
  readLine.innerHTML='👈 앞 장으로 돌아왔어요 — 다시 넘겨 보세요';
  dirMode="fwd"; committing=false;
}
function restoreFromBack(){ // 되돌리다 놓음 → 제자리로
  pgLeft.innerHTML=decorHTML();
  if(pk>=PAGES.length-1){ // 마지막 장이면 다시 마무리 상태로
    renderSpread();
    leaf.style.display="none";
    finishBtn.classList.add("on");
  }else{
    renderSpread();
  }
  dirMode="fwd";
}
function commitTurn(){ // 앞으로 다 넘어감
  committing=true;
  pk++;
  pgLeft.innerHTML=decorHTML();
  starCount++; renderStars();
  var cur=PAGES[pk];
  if(pk>=PAGES.length-1){
    // 마지막 장: 잎을 숨기고 마지막 말씀을 보여줌 — 자동으로 끝나지 않음
    leaf.style.display="none";
    readLine.innerHTML='💛 성경책에 <span class="nm">하나님 사랑</span>이 있어요';
    finishBtn.classList.add("on"); // 학생이 스스로 눌러서 마무리
    committing=false;
  }else{
    renderSpread();
    if(cur && !cur.type){
      readLine.innerHTML='💛 말씀이 나왔어요! 한 장 더 넘겨요';
    }
    committing=false;
  }
}

function openBook(){
  pk=0; committing=false; dirMode="fwd"; mode="idle";
  finishBtn.classList.remove("on");
  show("read");
  readLine.innerHTML='📖 책장을 잡고 <span class="nm">왼쪽</span>으로 넘겨요';
  requestAnimationFrame(function(){
    if(!segs.length) buildSegs(); else layoutSegs();
    pgLeft.innerHTML=coverLeftHTML();
    renderSpread();
    cornerHint.style.display="block";
    startLoop();
  });
}
finishBtn.addEventListener("click",function(){
  if(!finishBtn.classList.contains("on")||committing) return;
  finishBtn.classList.remove("on");
  praise("🥰","하나님은 "+STUDENT+"를 사랑하세요","성경책에 하나님 사랑이 있어요",2300,function(){
    stopLoop();
    show("end");
  });
});
window.addEventListener("resize",function(){
  if(scr.read.classList.contains("on") && segs.length){ layoutSegs(); paint(0.016); }
});

/* ================= 시작/다시 ================= */
$("btn-start").addEventListener("click",function(){
  round=0; starCount=0; renderStars(); stopLoop();
  show("pick"); loadRound();
});
$("btn-again").addEventListener("click",function(){
  round=0; starCount=0; renderStars(); stopLoop();
  show("pick"); loadRound();
});
renderStars();
})();
</script>
